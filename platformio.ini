[platformio]
src_dir = .

[env:m5cardputer]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
	-D IR_TX_PIN=44
	-D CORE_DEBUG_LEVEL=3
build_src_filter = +<*> -<.git/> -<**/PowerFunctionsIrRepeater/> -<**/PowerFunctionsIrControl/>
lib_deps = 
	https://github.com/m5stack/M5Gfx#0.2.22
	https://github.com/m5stack/M5Unified#0.2.17
	https://github.com/m5stack/M5Cardputer#1.2.0
	https://github.com/nonik0/legoino